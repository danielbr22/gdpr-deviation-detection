services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - hf_cache:/root/.cache/huggingface
    env_file:
      - path: .env
        required: false

volumes:
  ollama_models:
  hf_cache:
