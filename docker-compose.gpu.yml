# NVIDIA GPU override — passes all available GPUs into the Ollama container.
# Requires: NVIDIA Container Toolkit on Linux, or WSL2 + NVIDIA drivers on Windows.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
